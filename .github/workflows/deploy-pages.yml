# Reusable workflow: build a web_modules frontend and deploy it to GitHub Pages. Call it from your
# repo as a single job, granting the Pages permissions and enabling Pages once:
#
#   jobs:
#     pages:
#       uses: gronke/rust-web_modules/.github/workflows/deploy-pages.yml@v0
#       permissions:
#         pages: write
#         id-token: write
#       with:
#         packages: "lit@^3 bootstrap@^5"
#         template: web/index.html.tera
#   # one-time: repo Settings → Pages → Source: "GitHub Actions"
#
# This is a reusable workflow (not a composite action) because deploying needs job-level
# permissions:{pages:write,id-token:write}, the github-pages environment, and a separate deploy job —
# none of which a composite action can express. The build half is the root composite action
# (action.yml), reused here via its published ref.
name: deploy-pages

on:
  workflow_call:
    inputs:
      src:
        type: string
        required: false
        default: web
      out:
        type: string
        required: false
        default: dist
      packages:
        type: string
        required: false
        default: ""
      manifest:
        type: string
        required: false
        default: ""
      html:
        type: string
        required: false
        default: ""
      template:
        type: string
        required: false
        default: ""
      version:
        type: string
        required: false
        default: ""
      minify:
        type: boolean
        required: false
        default: true # Pages is production → minify by default.
      gzip:
        type: boolean
        required: false
        default: false # GitHub Pages serves its own compression, so sidecars aren't needed.
      mount:
        type: string
        required: false
        default: ""
        description: >-
          URL prefix for the vendored modules. Leave empty to auto-derive /<repo>/web_modules for a
          project page (served under /<repo>/); set /web_modules for a user/org page (a
          <owner>.github.io repo) served at the domain root.

# Never run two Pages deploys at once; let a newer push supersede an in-flight older one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # A project page lives at https://<owner>.github.io/<repo>/, so the dist (and its import map)
      # must be rooted at /<repo>/. Derive that mount unless the caller pinned one.
      - name: Resolve mount
        id: mount
        shell: bash
        env:
          MOUNT_IN: ${{ inputs.mount }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ -n "$MOUNT_IN" ]; then
            echo "value=$MOUNT_IN" >> "$GITHUB_OUTPUT"
          else
            echo "value=/$REPO_NAME/web_modules" >> "$GITHUB_OUTPUT"
          fi

      # Build dist/ with the root composite action. Pinned to the floating major tag `@v0`, which is
      # moved to each release (see release.yml) — a reusable workflow can't reference its own ref, and
      # `uses: ./` would resolve against the *caller's* checkout, not this repo. `@v0` keeps build and
      # workflow versions in lockstep for `…/deploy-pages.yml@v0` callers.
      - name: Build dist
        uses: gronke/rust-web_modules@v0
        with:
          src: ${{ inputs.src }}
          out: ${{ inputs.out }}
          mount: ${{ steps.mount.outputs.value }}
          packages: ${{ inputs.packages }}
          manifest: ${{ inputs.manifest }}
          html: ${{ inputs.html }}
          template: ${{ inputs.template }}
          minify: ${{ inputs.minify }}
          gzip: ${{ inputs.gzip }}
          version: ${{ inputs.version }}

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ inputs.out }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # The privileges a composite action can't grant — the reason deploy is a workflow job, not part
    # of action.yml.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
